body:
  text: 卷三金石部鍾乳味甘性溫入足太陰脾手太陰肺足少陰腎足厥陰肝經寧嗽止喘斂血祕精石鐘乳燥濕悍疾治脾腎濕寒遺精吐血腸滑乳閉虛喘勞嗽陽痿聲啞其功甚速寒消濕去食進氣充恃此縱欲傷精陽根升泄往往發為消淋癰疽之證固緣金石剽悍亦因服者恃藥力而雕斫也硫黃味酸性溫入足太陰脾足少陰腎足厥陰肝經驅寒燥濕補火壯陽石硫黃溫燥水土驅逐濕寒治虛勞咳嗽嘔吐泄利衄血便紅冷氣寒瘕腰軟膝痛陽痿精滑癰疽痔瘻疥癬癩禿敷女子陰癢洗玉門寬冷塗齇疣耵耳消胬肉頑瘡入蘿蔔內稻糠火煨熟去其臭氣研細用硝石能化硫為水以竹筒盛埋馬糞中一月成水名硫黃液硇砂味辛性溫入足太陰脾手太陰肺經攻堅破結化痞磨症硇砂辛烈消克治氣塊血症老翳胬肉停食宿膾疣痣贅瘤之屬本草謂其暖胃益陽消食止嗽備載服食之法如此毒物能使金石銷燬何可入腹但宜入膏散外用耳西番者佳金屑味辛性寒入足陽明胃手太陰肺經鎮定魂魄寧安驚悸金屑服之殺人性同鴆酒古人賜死往往用此本草謂其能止咳嗽吐血驚悸癲癇方士制煉服餌以為長生不死荒妄極矣或謂生者有毒熟者無毒胡說之至庸工每常用之即至少服不至殺人而驚悸自有原本鎮重之物何能得效砒霜味苦辛性熱入足太陰脾手太陰肺足厥陰肝經行痰化癖截瘧除齁砒霜辛熱大毒治寒痰冷癖久瘧積痢療痔漏瘰癧心痛齁喘蝕癰疽腐肉平走馬牙疳生名砒黃煉名砒霜經火更毒得酒愈烈過臍則生瀉服一錢殺人花乳石味酸性澀氣平入足厥陰肝經止血行瘀磨翳消瘴花乳石功專止血治吐衄崩漏胎産刀杖一切諸血善療金瘡合硫黃鍛鍊敷之神效亦磨遠年障翳化瘀血老症落死胎下胞衣煅研水飛用密陀僧味辛氣平入足厥陰肝經寧嗽止驚化積殺蟲密陀僧沉墜下行能降痰止吐化積除驚寧嗽斷痢止血消腫平痔瘻汗斑口瘡鼻齇臁瘡骨疽之屬研細水飛空青味苦性寒入足厥陰肝經磨翳明目化積行瘀空青清肝破滯治目昏眼痛赤腫障翳通經下乳利水消症石子如卵內含水漿搖之有聲其名空青點久年翳膜青盲殼亦磨障亦有內裹白麵者搽腫毒瘡癤甚效亦空青之別種極難得也層青味酸性寒入足厥陰肝經明目去翳破積殺蟲層青治眼痛赤爛多淚明目磨症化積亦同空青層青色如波斯青黛層層而出故名石青味甘氣平入足厥陰肝經明目止痛消腫破症石青清肝退熱治目昏眼痛跌打金瘡消癰腫化積聚吐頑痰石緑味酸氣平入足厥陰肝經止泄痢吐風痰石緑清涼重墜治風痰壅悶急驚昏迷青礞石味鹹氣平入手太陰肺足太陰脾經化痰消穀破積攻堅青礞石重墜下行化停痰宿谷破硬塊老瘀其性迅利不宜虛家庸工有滾痰丸方用礞石大黃瀉人中氣最可惡也海浮石味鹹氣平入手太陰肺足厥陰肝經化痰止渴破滯軟堅海浮石鹹寒通利能化老痰消積塊止消渴通淋澀去翳障平癭瘤清金止嗽瀉濕消疝亦兼治疔毒惡瘡鐵鏽味鹹氣平入手太陰肺足厥陰肝經消腫敗毒降逆清熱鐵鏽重墜清降消腫毒惡瘡療蜘蛛蜈蚣諸傷銅青味鹹氣平入手太陰肺足厥陰肝經止血行痰消腫合瘡銅青即銅緑酸澀能合金瘡止血流平牙疳肉蝕收爛弦冷淚消臁瘡頑癬療痔瘻楊梅去風殺蟲生髮點痣功專外用不入湯丸醫書用吐痰殊非良法石灰味辛性溫入手太陰肺手陽明大腸經止血化積殺蟲石灰溫暖燥烈收濕驅寒治癰疽疥癬瘰癧癥瘕痔瘻癭疣白瘢黑痣松刺瘜肉水泄紅爛赤帶白淫脫肛陰挺囊墜發落牙疼口喎止痛合瘡生肌長肉墜胎殺蟲染髮烏須收金瘡血流但可外用熏敷塗不可服餌牛膽拌套風乾者佳緑礬味酸性涼入手太陰肺手陽明大腸經消癰化積止血平瘡緑礬燥烈收澀治痰涎瘧痢積聚脹滿喉痹牙蟲耳瘡眼疼弦爛水腫崩中便血疥癬禿瘡之爛蛆生者亦外用未可輕服蓬砂味鹹性涼入手太陰肺經化痰止嗽磨翳消症蓬砂消症化瘀治癖積翳障胬肉結核喉痹骨硬本草謂其化痰止嗽清肺生津除反胃噎膈此非循良之性未可服餌也膽礬味酸性寒入手太陰肺經降逆止嗽消腫化積膽礬酸澀燥收能克化癥結消散腫毒治齒痛牙疳喉痹牙蟲鼻內陰蝕腳疽痔瘻楊梅金瘡白瘢一切腫痛療帶下崩中治上氣眼疼弦爛瘋狗咬傷百蟲入耳腋下狐臭吐風痰最捷爐甘石味甘氣平入手太陰肺經明目退翳收斂瘡肉爐甘石清金燥濕治眼病紅腫翳障弦爛淚流兼醫痔瘻下疳止血消毒並療陰囊濕癢爐甘石生金銀礦秉寒肅燥斂之氣最能收濕合瘡退翳除爛但病重根深不能點洗收效必須服藥餌用拔本塞源之法若眼科諸言一派胡說不可服也鍛紅童便浸數次水洗研細水飛珊瑚味辛氣平入手太陰肺經點眼去翳吹鼻止衄珊瑚磨翳消障功載本草而取效甚難至謂化血止衄則其說更荒誕瑪瑙味辛氣平入手太陰肺經點眼去翳尉目消紅瑪瑙磨翳退障存此一說可也至於收功奏效則未能矣石燕味甘性涼入足少陰腎足太陽膀胱經利水通淋止帶摧生石燕甘寒滲利瀉膀肌濕熱治淋瀝熱澀溺血便血消渴帶下痔瘻障翳齒動牙疼捲毛倒捷石蟹味苦咸性寒入手少陰心足少陽膽經清心瀉熱明目磨翳石蟹鹹寒瀉火治青盲白翳瘟疫熱疾催生落胎行血消腫癰疽熱毒吹喉痹解漆瘡石蠶味苦微涼入足太陽膀胱經通淋瀝生肌肉石蠶清利膀胱治石淋血結磨服則下碎石石鰲味甘性涼入足太陽膀胱經通淋瀝止便血石鰲清瀉膀胱治小便淋瀝陽起石味鹹微溫入足少陰腎足厥陰肝經起痿壯陽止帶調經陽起石溫暖肝腎強健宗筋治寒疝冷瘕崩漏帶下陰下濕癢腰膝痠疼腹痛無子經期不定吸鐵石味辛微寒入足少陰腎手太陰肺經補腎益精吸鐵石收斂肺腎治耳聾目昏喉痛頸核筋羸骨弱陽痿脫肛金瘡腫毒咽鐵吞針斂肝止血種種功效悉載本草庸工用之殊無應驗非藥石中善品也火煅醋淬研細水飛自然銅味辛氣平入足少陰腎足厥陰肝經補傷續絶行瘀消腫自然銅燥濕行瘀止痛續折治跌打損傷癥瘕積聚破血消癭寧心定悸療風濕癱瘓之屬自然銅收濕之力與無名異同火鍛醋淬研細水飛無名異味鹹氣平入足少陰腎足厥陰肝經接骨續筋破瘀消腫無名異燥濕行瘀消腫止痛治金瘡打損筋斷骨折癰疽楊梅痔瘻瘰癧腳氣臁瘡之類無名異善收濕氣調漆煉油其幹甚速至燥之品鐵落味辛氣平入手少陰心足少陽膽經寧心下氣止怒除狂生鐵落素問病能論用治怒狂曰生鐵落者下氣疾也肝主怒肝虛則驚悸善恐膽旺則風狂善怒鐵落鎮伏肝膽收攝神魂止驚除狂是所長也針砂味鹹氣平入手少陰心足太陽膀胱經寧神止驚瀉濕消脹針砂鎮定心神疏通水道治驚癇掃痰飲治水脹除黃疸縮癭瘤染鬚髮然金石重墜未宜輕服炒尉手足去濕痹疼痛甚效水銀味辛性寒入手少陰心足少陰腎經殺蟲去蝨止痛拔毒水銀大寒至毒治疥癬痔瘻楊梅惡瘡滅白癜粉疱但可塗搽不可服餌服之痿陽絶産筋攣骨痛古人服方土燒煉水銀以為不死神丹殞命夭年不可勝數帝王將士多被其毒古來服食求神仙多為藥所誤其由來遠矣勿入瘡口輕粉味辛性寒入足少陰腎足厥陰肝經搽疥癬塗楊梅輕粉辛冷毒烈服之筋骨拘攣齒牙脫落庸工用治楊梅惡瘡多被其毒不可入湯丸也本草謂其治痰涎積滯氣臌水脹良藥自多何為用此輕粉即水銀鹽礬升煉而成者其性燥烈能耗血亡津傷筋損骨元明粉味辛咸性寒入手少陰心手太陰肺經瀉熱除煩掃症破結元明粉鹹寒疏蕩治心肺煩熱傷寒發狂眼痛鼻衄宿滯老瘢元明粉乃朴硝蘿蔔甘草熬煉而成是方士造作以為服食卻病之藥瀉火伐陽捨生取死原非通制不必用也百草霜味辛氣平入足厥陰肝經斂營止血清熱消瘀百草霜專止失血治吐衄便溺産漏諸血甚效百草霜即灶內煙煤與釜臍灰同性
