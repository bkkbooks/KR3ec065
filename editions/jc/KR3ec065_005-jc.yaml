body:
  text: 卷五禽獸部牛肉味甘性平入足太陰脾足厥陰肝經補中培土養血榮筋素問脾色黃宜食甘粳米牛肉棗葵皆甘牛肉補益脾肝滋養血肉壯筋強骨治腰膝軟弱消渴癖積塗牛皮風癬水牛肉性寒兼消水腫利小便牛乳清肺潤腸退熱止渴療黃疸牛髓補精添力續絕補傷牛腦潤皴裂消癖積牛膽套南星治驚化痰牛角腮通經破瘀止血泄利牛涎治反胃噎膈牛溺治水腫尿癃牛黃治驚狂風熱敗鼓皮治蠱毒淋漓馬勃治咽喉痹痛久嗽失聲骨鯁吐衄馬勃亦名牛屎菰馬肉味辛苦性寒入足陽明胃手太陰肺經清金下氣壯骨強筋馬肉辛冷無補益駿馬肉有毒醇酒杏蘆菔汁解馬肝有毒漢書文成食馬肝死景帝曰食肉不食馬肝馬肝大毒入瘡則死慄杵灰汁浸洗白沫出解白馬溺治積聚癥瘕祖臺之志怪載治鱉瘕事山羊血味鹹甘氣平入足厥陰肝經最行瘀血絕止㽲痛山羊血治瘀血作痛療跌撲損傷甚捷犀角味苦酸性寒入足厥陰肝足少陽膽手少陰心經泄火除煩解毒止血犀角寒涼瀉火治胸膈熱煩口鼻吐衄瘟疫營熱發斑傷寒血瘀作狂消癰疽腫痛解飲食藥餌山水瘴癘諸毒凡勞傷吐衄之證雖有上熱而其中下兩焦則是寒濕當與溫中燥土之藥並用庸工犀角地黃一方犀角可也地黃瀉火敗土滋濕伐陽則大不可矣羚羊角味苦咸微寒入足厥陰肝經清風明目泄熱舒筋羚羊角清散肝火治心神驚悸筋脈攣縮去翳明目破瘀行血消瘰癧毒腫山水瘴癘平肝治脹滿除腹脅疼痛青羊肝味苦微寒入足厥陰肝經清肝退熱明目去翳青羊肝苦寒清肝膽風熱治眼病紅腫翳膜昏花喪明療牙疳痢疾青羊膽治青盲白翳紅瘀赤障便秘腸結䵟疱疳瘡白羊乳潤肺止渴治口瘡舌腫心痛腸燥蜘蛛咬傷蚰蜓入耳灌之即化成水白狗膽味苦性寒入足少陽膽足厥陰肝經明目退翳破瘀消積白狗膽苦寒清肝膽風熱治眼痛鼻癰鼻衄耳聤殺蟲化積止痛破血凡刀箭損傷及腹脅瘀血瘀痛熱酒服半枚瘀血盡下兼敷一切惡瘡白狗乳點久年青盲於目未開時點目開而瘥塗赤禿髮落拔白生黑白狗血治癲疾黑狗血治難產橫生鬼魅侵凌狗寶溫胃降逆止噎納穀療癰疽療毒狗陰莖壯陽起痿除女子帶下陰癢獺肝味甘微溫入足厥陰肝經補虛益損止嗽下衝獺肝溫中降逆治虛勞咳嗽上氣痔瘻下血鬼魅侵侮之證五靈脂味辛微溫入足厥陰肝經開閉止痛磨堅五靈脂最破瘀血善止疼痛凡經產跌打諸瘀心腹脅肋諸痛皆療又能止血凡吐衄崩漏諸血皆收生用行血熟用止血夜明砂味淡氣平入足厥陰肝經消積聚去翳障蝙蝠屎名夜明砂能磨翳明目消腫破積止痛除驚去黑䵟下死胎療瘰癧治馬撲腫痛月明砂味淡氣平入足厥陰肝經去翳障療痔瘻兔屎名月明砂能明目去翳消痔殺蟲庸工習用不效季明又言其能治虛勞夜熱更荒誕雞內金味甘氣平入手陽明大腸足厥陰肝經止利斂血利水秘精雞內金扶中燥土治泄利崩帶尿血便紅喉痹乳蛾口瘡牙疳失溺遺精酒積食宿胃反膈噎並消癰疽發背鷹屎白味淡微寒入手太陰肺足厥陰肝經消積滅痕化硬退疱鷹屎白滅打傷瘢痕消頭面䵟𪒟化癖積骨鯁鹿茸味辛微溫入足少陰腎足厥陰肝經生精補血健骨強筋鹿茸補益腎肝生精補血最壯筋骨治陽痿精滑鬼交夢泄崩漏帶濁腰疼膝軟目眩耳聾諸證酥炙用研碎酒煮去渣熬濃重湯煮成膏最佳鹿角膠味辛咸微溫入足少陰腎足厥陰肝經補腎益肝斂精止血鹿角膠溫補肝腎滋益精血治陽痿精滑鬼交夢遺吐衄崩帶腰疼膝痛瘡瘍毒腫跌打損傷宜子安胎補虛回損功效極多但性滯不宜脾胃中焦鬱滿者切忌服之蛤粉炒研用生研酒服行瘀血腫毒塗抹亦良煉霜熬膏專補不行膠霜功同而霜不膠黏似勝雀卵味鹹性溫入足少陰腎足厥陰肝經壯陽起痿暖血溫精雀卵溫補肝腎精血治男子陽痿女子帶下精寒血枯固瘕㿉疝之證素問治女子血枯月事衰少不來用烏鰂骨䕡茹丸以雀卵雄雀屎名白丁香能點翳膜胬肉消積聚癥瘕敷癰疽潰頂吹喉開痹虎骨味辛咸氣平入足少陰腎經療關節氣冷治膝脛腫痛虎骨逐痹通關強筋健骨平歷節腫痛愈腰膝痿軟諸獸骨鯁惡犬咬傷痔瘻脫肛俱效脛骨良酥炙研用熬膏佳手病用前腿骨足病用後腿骨左病用右右病用左象皮味鹹氣平入足太陽膀胱經合瘡口生肌膚象皮治金瘡不合一切瘡瘍收口生肌俱捷燒灰存性研細用象牙治諸刺入肉傷喉敷飲皆效熊膽味苦性寒入手少陰心足少陽膽足厥陰肝經清心瀉熱去翳殺蟲熊膽苦寒清君相二火瀉肝明目去翳殺蟲寧魂止驚治牙疳鼻衄耳瘡痔瘻之屬鼠膽味苦性寒入手少陰心足少陽膽足厥陰肝經點目昏滴耳聾鼠膽塗箭鏃不出聤耳汁流鼠糞名兩頭尖治傷寒勞復男子陰易通室女子經閉收產婦陰脫療癰疽乳吹犬咬鼠瘻日華子謂其明目然誤入食中令人目黃成疸亦非明目之品燕子窠味辛氣平入手少陰心經消惡瘡敗腫毒胡燕窠土消腫解毒治疥癘浸淫黃水白禿一切惡瘡塗洗皆效
