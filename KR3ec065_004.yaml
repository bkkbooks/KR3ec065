body:
  text: 卷四果部龍眼味甘微溫入足太陰脾足厥陰肝經補脾養血滋肝生精龍眼甘能益脾潤可生精滋肝木而清風燥降心火而消熱煩補陰生血而不至滋濕伐陽傷中敗土至佳之品勝歸地諸藥遠矣以有益智之名本草謂其寧神益智神歸於血智生於神此亦固有之理也至於驚悸不寐根因濕旺胃逆陽泄不藏嚴氏歸脾以為血虛而用龍眼則難效矣荔枝味甘性溫入足太陰脾足厥陰肝經暖補脾精溫滋肝血荔枝甘溫滋潤最益脾肝精血木中溫氣化火生神人身之至寶溫氣虧損陽敗血寒最宜此味功與龍眼相同但血熱宜龍眼血寒宜荔枝木鬱血熱火泄金燔者食之則齦腫鼻衄非所當服乾者味減不如鮮者而氣質和平補益無損不至助火生熱則大勝鮮者其功生津止渴悅色益顏發痘消瘡治腫疔瘰癧贅瘤之類荔枝核治㿗疝囊腫甘蔗味甘微寒入足太陰脾足陽明胃經瀉熱除煩蔗漿甘寒解酒清肺故漢書有蔗漿折朝酲王維有大官還有蔗漿寒之語土燥者最宜陽衰濕旺者服之亦能寒中下利本草謂其下氣止嘔則雖屬甘緩亦頗疏利不壅與白砂糖性同功用相仿甜瓜味甘性寒入足太陰脾足陽明胃經清煩止渴解暑涼蒸甜瓜甘寒疏利甚清暑熱但瀉胃滑腸陽衰土濕者食之必泄利生冷敗脾以此為最蓮子味甘性平入足太陰脾足陽明胃足少陰腎手陽明大腸經養中補土保精斂神善止遺泄能住滑溏蓮子甘平甚益脾胃而固澀之性最宜滑泄之家遺精便溏極有良效心名蓮薏苦寒瀉火治心煩上熱之證陽虛火敗去心用藕能活血破瘀敷金瘡折傷生食清肺止渴蒸食開胃止泄蓮蕊固精止血悅色烏須蓮房止崩漏諸證荷蒂能領諸藥直至巔頂胡桃味甘性澀氣平入足陽明胃手太陰肺經寧嗽止喘利水下食胡桃核斂澀滋潤能進飲食止喘嗽潤腸胃通淋澀除崩漏消癰腫敷瘰癧塗疥癬療頭瘡鼻齇聤耳便血吞銅遺精失溺澤膚潤腸黑烏鬚髮治腰疼腹痛寒疝紅痢醋心之類魚口便毒火燒打損疔瘡之屬油胡桃治癰腫疥癬楊梅禿瘡潤澤鬚髮青皮染髭鬚白瘢山楂味酸甘氣平入足太陰脾足厥陰肝經消積破結行血開瘀山楂消克磨化一切宿肉停食血症氣塊皆除栗子味甘咸氣平入足太陰脾足少陰腎經補中培土養胃益脾素問臟氣法時論心色赤宜食鹹大豆豚肉慄藿皆咸戊土降於丁火得離中之陰精己土升於癸水得坎中之陽氣故苦則入胃咸則歸脾栗子鹹甘入脾補中助氣充虛益餒培土實脾諸物莫逮但多食則氣滯難消少啖則氣達易克耳生食治腰腿不遂生嚼塗筋骨碎斷又消腫痛行瘀血破痃癖去惡刺出箭頭止鼻衄斂泄利風乾者佳殼止便血殼內薄皮治骨鯁橡子味苦性澀氣平入足太陰脾手陽明大腸經健脾消穀澀腸止利橡子苦澀收斂暖胃固腸消食止泄治泄利脫肛斷痔瘻失血磨塗癰疽堅硬不消殼止下利便血帶下崩中烏須染髮性最斂澀荸薺味甘微寒入足太陰脾足厥陰肝經下食消穀止血磨症荸薺甘寒清利治熱煩消渴化宿谷堅症療噎膈黃疸解金石蠱毒醫吞銅便血止下利崩中攻堅破聚是其所長但寒胃氣脾弱者食之則臍下結痛荸薺即地慄亦名鳧茨爾雅作鳧茈西瓜味甘微寒入手太陰肺足太陽膀胱足陽明胃經清金除煩利水通淋西瓜甘寒疏利清金利水滌胸膈煩躁瀉膀胱熱澀最佳之品脾胃寒濕取汁熱服蒲桃味甘酸微寒入手太陰肺足太陽膀胱足陽明胃經清金解渴利水除淋蒲桃清金利水治煩渴熱淋療胎氣衝心其力未及西瓜亦佳品也蒲桃出自西域漢書西域傳大宛諸國富人以蒲桃作酒藏之數十年不壞張騫攜其種來中國始生後人作葡萄黃橘味甘酸微寒入手太陰肺經清金止渴涼膈除煩黃橘酸甘清利治心肺煩渴但生冷之性滋濕敗土聚涎生痰陽虛濕旺者忌之青皮破滯攻堅伐肝瀉肺庸工最肯用之青梨味甘酸微寒入手太陰肺經清心涼肺止渴消痰青梨甘寒清利涼心肺煩熱滋臟腑燥渴洗滌涎痰疏通鬱塞滋木清風瀉火敗毒治風淫熱鬱欲作癱瘓癰疽之病陰旺土濕者忌之瀉胃滑腸不可恣食上熱者取汁溫服點眼病赤腫胬肉柿霜味甘性涼入手太陰肺手少陰心經清金止渴化痰寧嗽柿霜清心肺煩熱生津解渴善治痰嗽消咽喉口舌諸瘡腫痛乾柿餅清肺澀腸消痰止渴治吐血淋血痔瘻腸癖肺痿心熱咳嗽喑啞枇杷味酸甘氣平入手太陰肺經潤腸解渴止嘔降逆枇杷酸收降利治肺胃沖逆嘔噦煩渴葉能清金下氣寧嗽止吐清涼瀉肺治標之品去毛蜜炙止嗽最善楊梅味酸甘微溫入手太陰肺經除痰止嘔解渴斷痢楊梅酸澀降斂治心肺煩郁止嘔食吐酒療痢疾損傷止血衄核仁能治腳氣楊梅生瘴癘之鄉其味酸甘多食損齒傷筋惟桑土者不酸林邑生者實如杯盎青時極酸熟則如蜜釀酒號梅香釅土人珍重之橄欖味酸性澀氣平入手太陰肺經生津止渴下氣除煩橄欖酸澀收斂能降逆氣開胃口生津液止煩渴消酒酲化魚鯁收泄利療咽喉腫痛解魚鱉諸毒平唇裂牙疳果與木核皆靈核治㿗疝林檎味酸性澀氣平入手太陰肺經生津解渴下氣消痰林檎酸澀收斂治肺熱消渴療腸滑泄利金棗味酸甘微涼入手太陰肺經下氣寬胸解酲止渴金棗酸涼清肺降胸膈逆氣治上熱煩渴金棗亦名橘似橘小而皮光大如胡桃夏青冬黃在樹至三五年樹高數尺霜雪不凋實隨年長形如雞卵色青黃如初年也銀杏味苦甘性澀氣平入手太陰肺經降痰下氣寧嗽止喘銀杏苦澀斂肺降痰涎止喘嗽縮小便除白濁收帶下更去齇疱䵟𪒟平手足皺裂療頭面癬疥殺蟲去蝨皆效銀杏即白果熟食益人葉闢諸蟲芡實味甘性澀入手太陰肺足少陰腎經止遺精收帶下芡實固澀滑泄治遺精失溺白濁帶下之病石榴皮味酸性澀入手陽明大腸足厥陰肝經斂腸固腎澀精止血石榴皮酸澀收斂治下利遺精脫肛便血崩中帶下之病點眼止淚塗瘡拔毒木瓜味酸性澀微寒入手太陰肺足厥陰肝經斂腸止泄逐濕舒筋木瓜酸斂收澀能斂肺固腸燥土瀉肝治霍亂吐利腹痛轉筋療腳氣治中風筋攣骨痛其主治諸病總皆寒濕之邪但用木瓜終難成效本草謂其性溫止泄而搪積瓜汁寒脾冷飲立生泄利雖能瀉肝止痛而土虛木賊最忌酸收功止治標未能無弊何如苓桂姜甘溫燥之品效大而力捷也木瓜鮮者糖餞斂肺止渴棠梨味酸性澀微寒入手太陰肺足厥陰肝經收腸斂肺止泄除嘔棠梨酸澀功同木瓜治霍亂吐瀉腹痛轉筋燒食止泄利香櫞味苦酸微涼入手太陰肺經清金下氣止嗽除痰香櫞長於行氣香橙味酸入手太陰肺經寬胸利氣解酒消癭香橙善降逆氣止噁心消癧癧癭瘤附谷菜部芝麻味甘氣平入足厥陰肝手陽明大腸經潤肺開閉芝麻補益精液滋潤肝腸治大便結塞清風榮木養血舒筋療語塞步遲皮燥發枯髓涸肉減乳少經阻諸證醫一切瘡瘍敗毒消腫生肌長肉殺蟲生禿髮滑產催衣皆善扁豆味甘氣平入足太陰脾手陽明大腸經培中養胃住泄止嘔扁豆性甘平斂澀補土治泄亦良善之品也用白者佳瓠蘆味甘氣平性滑入手太陰肺足太陽膀胱經清金潤燥利水瀉濕瓠蘆清金利水治心肺煩熱溲溺淋澀脹滿黃腫之證鮮者作羹甘滑清利亞腰者連子燒研飲送每服一枚水脹腹滿十餘日消亦作葫蘆瓠蘆甘寒瀉水排停痰宿飲消水腫黃疸煮汁漬陰能通小便煎湯滴鼻即出黃水療鼻塞牙疼去胬肉老翳治癰疽痔瘻疥癬癩瘑點鼻肉吹耳膿吐蠱毒下死胎灸下部懸癰能吐能泄冬瓜味酸甘微寒入手太陰肺足太陽膀胱經清金止渴利水消脹冬瓜清金利水治消渴水脹泄痢淋澀癰疽痔瘻皆醫解食中毒洗頭面䵟𪒟冬瓜去皮切片酒水煮爛去渣熬濃器收每夜塗面變黑為白光澤異前白芥子味辛氣溫入手太陰肺經破壅豁痰止喘寧嗽白芥子辛溫利氣掃寒痰冷涎破胸膈支滿治咳逆喘促開胃止痛消腫辟惡皆良萊菔子味辛氣平入手太陰肺經下氣止喘化痰破郁萊菔子辛烈疏利善化痰飲最止喘嗽破郁止痛利氣消穀生研吐老痰韭子味辛性溫入足少陰腎足厥陰肝經秘精斂血暖膝強腰韭子溫補腎肝治白淫赤帶腰膝軟弱宗筋下痿精液常流韭菜汁治吐衄便溺諸血行打撲損傷諸瘀療女子經脈逆行止胸膈刺痛如錐消散胃脘瘀血
