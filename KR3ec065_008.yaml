body:
  text: 卷八雜類部紫梢花味甘性溫入足少陰腎足厥陰肝經起痿壯陽暖腎秘精紫梢花溫暖肝腎強筋起痿治遺精白濁陰癢囊濕冷帶之證玉簪根味辛性寒入足少陰腎經化骨落牙斷產消癰玉簪根味辛寒透骨能落牙齒化骨鯁絕胎妊散腫毒研塗一切癰腫作湯不可著牙最能損齒鳳仙子味苦微溫入足少陰腎經軟堅化骨消癖落牙鳳仙子其性最急能化骨鯁落牙齒催生產消癖塊與玉簪根性略同而迅烈過之作油以少許滴蟹上其殼立碎崩落釜中錦地羅味苦氣平入手少陰心經消腫解毒兼解瘴癘錦地羅治瘴氣癘毒一切飲食諸毒生研酒服塗抹皆效墓田回氣平入足少陰腎經除崩止帶斂血秘精墓田回治崩中帶下收斂疏泄莧實味甘性寒入手陽明大腸足太陽膀胱足厥陰肝經去翳明目殺蛔清風莧實清利肝肺治青盲瞽目白翳黑花疏木殺蟲滑腸利水通利大小二便經水味鹹氣平入手太陰肺足太陰脾足厥陰肝經退疸去黃止血消腫經水清熱去濕治熱病勞復女勞黃疸癰疽濕癢療虎狼藥箭諸傷俗子以為紅鉛制煉服餌愚謬不通雞冠味苦微涼入足厥陰肝經清風退熱止衄斂營雞冠花止九竅失血吐血崩漏淋痢諸血皆止並治帶淋之證花與子同功粟殼味鹹性澀微寒入手太陰肺手陽明大腸經收肺斂腸止咳斷利罌粟殼酸澀收斂治咳嗽泄利肺逆腸滑之病初病忌服當與行郁瀉濕之藥並用乃可並治遺精鴉片煙味酸性澀微溫入手陽明大腸足少陰腎經斂腸止泄保腎秘精鴉片煙收澀斂固治泄利脫肛精滑夢遺本草謂鴉片即罌粟未開針刺青苞津出刮收陰乾而成名阿芙蓉今洋船至關多帶此物關中無賴之徒以及不肖子弟宮宦長隨優伶娼妓以為服之添筋力長精神御淫女抱孌童十倍尋常但壽命不永難逃五年此煙非延年養生之品斷宜戒之
