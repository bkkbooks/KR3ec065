body:
  text: 卷六鱗介魚蟲部膃肭臍即海狗腎味鹹性熱入足少陰腎足厥陰肝經補精暖血起痿壯陽膃肭臍溫暖肝腎治宗筋痿弱精冷血寒破堅症老血治鬼交夢遺健膝強腰補虛益損洗陰癢生瘡海馬味甘性溫入足少陰腎足厥陰肝經暖水壯陽滑胎消症海馬溫暖肝腎起痿壯陽破症塊消疔腫平癰疽催胎産龜板味鹹性寒入足少陰腎經瀉火滋陰寒胃滑腸龜板鹹寒瀉火敗脾傷胃久服胃冷腸滑無有不死朱丹溪以下庸工作補陰之方用龜板地黃知母黃柏治內傷虛勞之證鏟滅陽根脫泄生氣俗子狂夫廣以龜鹿諸藥禍流千載毒遍九州深可痛恨也燒研敷飲治諸癰腫瘍甚靈桑螵蛸味鹹氣平入足少陰腎足太陽膀胱足厥陰肝經起痿壯陽回精失溺桑螵蛸溫暖肝腎疏通膀胱治遺精失溺經閉陽痿帶濁淋漓耳痛喉痹瘕疝骨鯁之類皆效炮研細用緑蜻蜓味鹹微溫入足少陰腎足厥陰肝經強筋壯陽暖水祕精緑蜻蜓溫暖肝腎治陽痿精滑近時房中藥多用紅色者桑蟲味苦氣平入手少陰心足厥陰肝經止崩除帶消脹桑蟲行瘀破滯治口瘡目翳崩中帶下庸工以起小兒痘瘡塌陷不通之至蝸牛味鹹性寒入足太陽膀胱足厥陰肝經利水瀉火消腫敗毒蝸牛去濕清熱治痔瘻瘰癧發背脫肛耳聾鼻衄喉痹腮腫目翳面瘡解蜈蚣蚰蜒蜂蠍諸毒生搗燒研塗敷皆良蚯蚓土味鹹微寒入手少陰心經除濕熱消腫毒蚯蚓土清熱消腫敷乳吹卵腫聤耳痄腮一切腫毒少腹小便脹閉原蠶蛾味鹹性溫入足少陰腎足厥陰肝經暖腎壯陽固精斂血原蠶蛾溫暖肝腎大壯陽事治遺精溺血療金瘡滅瘢痕止白濁螻蛄味鹹性寒入足太陰膀胱經利水消腫開癃除淋螻蛄鹹寒清利膀胱濕熱消水病脹滿小便淋瀝下胎衣平瘰癧出針刺拔箭鏃腰前甚澀能止大小便腰後甚利能利大小便研細吹鼻中即出黃水管吹莖內立開小便功力甚捷螺螄味甘性寒入足太陽膀胱經清金止渴利水瀉熱螺螄清金利水瀉濕除熱治水腫脹滿療腳氣黃疸淋瀝消渴疥癬瘰癧眼病脫肛痔瘻痢疾一切疔腫之證煮汁療熱醒酒水田江湖溪澗諸螺性同敷飲皆效黃蠟味淡氣平入手太陰肺足厥陰肝經斂血止痢接骨續筋黃蠟凝聚收澀治泄痢便膿胎動下血跌打金刃湯火蛇咬凍裂一切諸瘡愈破傷風白蠟味淡氣平入手太陰肺足厥陰肝經止血生肌補傷續絶白蠟堅凝斂聚能消腫止痛長肉合瘡接筋續骨外科要品也白蠟即黃蠟之殊色者此是蠟樹蟲吐白如胡粉也珍珠味甘咸微涼入手太陰肺足厥陰肝經明目去翳安魂定魄珍珠涼肺清肝磨翳障去驚悸除遺精白濁下死胎胞衣塗面益色敷疔拔毒止渴除煩滑胎催生石決明味鹹氣寒入手太陰肺足太陽膀胱經清金利水磨翳止淋石決明清肺開鬱磨翳消障治雀目夜昏青盲晝暗瀉膀胱濕熱小便淋漓服點並用但須精解病源新制良方用之乃效若庸工妄作眼科諸方則終身不靈久成大害萬不可服麵煨去粗皮研細水飛蟬蛻味辛氣平入手太陰肺經發表驅風退翳消腫蟬蛻輕浮發散專治皮毛退翳膜消腫毒治大人失音小兒夜啼取其晝鳴夜息之意庸工以治大人頭風眩暈小兒痘瘡癢塌則不通矣眩暈不緣風邪癢塌全因衛陷此豈蟬蛻所能治也又治驚癇噤風亦殊未然蛇蛻味鹹氣平入手太陰肺經發表驅風退翳敗毒蛇蛻發散皮毛治瘡瘍毒腫至於退翳膜止驚癇則非蛇蛻蟬蛻所能奏效庸工往往不解病源而但用表散之品可見庸陋極矣蛤蚧味鹹氣平入手太陰肺足太陽膀胱足少陰腎足厥陰肝經斂血止嗽利水助陽蛤蚧收降肺氣疏通水腑治喘嗽吐血消渴癃淋通經行血起痿壯陽及虛勞羸弱之病去頭眼鱗爪酒浸酥炙黃研細口含少許馳百步不喘止喘寧嗽功力甚捷其毒在頭足其力在尾如蟲蛀其尾者不足用蜥蜴味鹹性寒入手太陰肺足太陽膀胱足少陰腎足厥陰肝經消癩通淋破水積治瘻瘡蜥蜴亦名石龍子能吐雹祈雨故善通水道酥炙研細用蟾酥味辛微溫入手太陰肺足少陰腎經澀精助陽敗毒消腫蟾酥研塗磨麈頂治精滑夢遺磨點瘡頭治疔毒癰腫磨腰暖腎揩牙止痛辛烈殊常入鉢擂研氣衝鼻孔噴嚏不止沾唇麻辣何能當者外科家因作小丸服甚非良善之法也五倍子味酸氣平入手太陰肺手陽明大腸經收肺除咳斂腸止利五倍酸收入肺斂腸墜縮肛脫消腫毒平咳逆斷滑泄化頑痰止失紅斂潰瘡搽口瘡吹喉痹固盜汗止遺精治一切腫毒痔瘻疥癩金瘡之類五倍釀法名百藥煎與五倍同功蛤粉味鹹性寒入手太陰肺足太陽膀胱經清金利水化痰止嗽蛤粉鹹寒清利涼金退熱利水瀉濕治咳嗽氣逆胸滿痰阻水脹溺癃崩中帶下癭瘤積聚鍛研用全蠍味辛氣平入足厥陰肝經穿筋透節逐濕除風全蠍燥濕驅風治中風喎斜癱瘓小兒驚搐女子帶下諸證此亦庸工習用之物諸如此種大方之家概不取也殭蠶味辛咸氣平入足厥陰肝經活絡通經驅風開痹殭蠶驅逐風邪治中風不語頭痛胸痹口噤牙痛癮疹風瘙瘰癧疔毒䵟斑粉刺疳痔金瘡崩中便血治男子陰癢小兒驚風諸證此庸工習用之物風邪外襲宜發其表風燥內動宜滋其肝表裡不治但事驅風欲使之愈復何益也愈驅愈盛不通之極矣殭蠶燒研酒服能潰癰破頂又治血淋崩中蠶脫紙燒研治吐衄便溺諸血小兒淋漓諸瘡腫痛白花蛇味鹹微溫入足厥陰肝經通關透節瀉濕驅風白花蛇穿經透骨開痹搜風治鼻口喎斜手足癱瘓骨節疼痛肌膚麻癢疥癩風癲之證中風病因木鬱風動血燥筋枯外風虛邪表閉筋縮四肢而成而木鬱之由全緣水寒土濕生髮不遂白花蛇外達筋脈則益其枯燥內行臟腑不能去其濕寒非善品也庸工習用諸方標本皆背無益於病而徒殺生靈甚無益也讀柳子厚捕蛇之篇至可傷矣烏梢蛇味鹹氣平入足厥陰肝經起風癱除疥癘烏梢蛇穿筋透絡逐痹驅風治中風麻痹疥癘瘙癢與白花蛇同風癩因風傷衛氣衛斂營郁營熱外發紅點透露則為疹紅點不透隱於皮里是為癮疹隱而不發血熱瘀蒸久而肌膚潰爛則成痂癩仲景有論及之而後世不解用搜風之物枉害生靈無補於病諸如此類概不足取也斑蝥味辛微寒入足厥陰肝經消腫敗毒利水通淋斑蝥辛寒毒烈墜胎破積追毒利水止瘰癧疥癬癰疽瘕疝下蠱毒開癃淋點疣痣消㾦㿔解瘋狗傷斑蝥糯米同炒去斑蝥用米研細清油少許冷水調服治瘋狗傷小便利下毒物而瘥利後腹痛冷水青靛解之瘰癧每服一枚不過七枚毒從小便出如粉片血塊而瘥毒下小便痛瀝不堪宜滑石燈心等引之使下蜈蚣味辛微溫入足厥陰肝經墜胎破積拔膿消腫蜈蚣辛溫毒悍能化癖消積殺蟲解毒蠱治瘰癧痔瘻禿瘡便毒療蛇瘕蛇咬毒瘴蛇蠱庸工以治驚癇抽搐臍風口噤青魚膽味苦性寒入足厥陰肝經明目去翳消腫退熱青魚膽苦寒瀉肝膽風熱治眼病赤腫翳障嘔吐喉痹涎痰化魚骨鯁噎平一切惡瘡烏鰂魚味鹹氣平入足厥陰肝經行瘀止血磨障消症烏鰂魚骨善能斂新血而破瘀血素問治女子血枯先唾血四肢清目眩時時前後血以烏鰂魚骨䕡茹為末丸以雀卵血枯必由夫血脫血脫之原緣瘀滯不流經脈莫容烏賊骨行瘀固脫兼擅其長故能著奇功其諸治效止吐衄崩帶磨翳障䕡瘕療跌打湯火淚眼雀目重舌鵝口喉痹耳聤縮癭消腫拔疔敗毒斂瘡燥膿化鯁止齁收陰囊濕癢除小便血淋鯪甲味辛咸氣平入足陽明胃足厥陰肝經穿經透絡洞骨達筋鯪甲善穿通走竄透堅破結開經絡關節痹塞不通通經脈下乳汁透筋骨逐風濕止疼痛除麻痹消腫毒排膿血療癰疽痔瘻瘰癧疥癬奶吹乳岩陰痿便毒聤耳火眼蟻瘻鼠瘡至於癱瘓喎斜緩急拘攣未必能也而引達木榮筋之藥斬關深入直透拳曲拘攣之處則莫過於此病在上下左右依其方位取甲炒焦研細用亦名穿山甲鯉魚味甘性溫入足太陰脾手太陰肺足太陽膀胱經降氣止咳利水消脹鯉魚利水下氣治咳嗽喘促水腫黃疸冷氣寒瘕泄利反胃胎動乳閉燒灰醋和敷一切腫毒常食鼻口發熱助肺火鯽魚味甘性溫入足太陰脾足太陽膀胱足厥陰肝經補土培中利水敗毒鯽魚補土益脾溫中開胃治消渴水腫下利便血噎膈反胃骨疽腸癰疳痔禿瘡塗久年諸瘡不差
