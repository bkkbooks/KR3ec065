body:
  text: 自敘昔神農解藥黃帝傳醫仲景先生繼農黃立法聖作明述於是焉備癸酉仲春既解長沙藥性而仲景未用之藥散在後世本草數百千載狂生下士昧昧用之以毒兆民農黃以往仲景云祖後之作者誰復知醫解藥諸家本草率皆孟浪之談明李時珍修綱目博引庸工訛謬之論雜以小說稗官仙經梵志荒震無稽背馳聖明作述之義幾千里矣玉楸子悲憶昔人愴念來者甲戌三月成傷寒說意五月成素靈微蘊六月復作玉楸藥解八月癸丑告成此愚書之第八部也蕭蕭古寺落落荒齋感歲月之已晚傷春秋之欲暮當伯玉知非之時值孔子學易之秋事與之判年與之齊慨世短而心長念身微而愁劇雖然子長作史子云草玄固當牢騷於創始之日亦必愉快于勒成之時者志勵丁年書竣蒼首十仞作井一簣成山此亦煙嵐著書之士最為破涕而笑者也嗚呼有一代之功業有千秋之勳猷任兼將相望重國家宣沙漠之雄威馳丹青之良譽榮則榮矣無何而古墓為田松柏成薪豐碑已斷綠字無存傳觀故實不能考其姓名遠綜先典莫或搜其軼事念滄桑之更變嘆陵谷之遷移其間宏才遠略豐功偉烈生而光顯沒而泯滅者不知幾何三不朽事業殊不在是與其收功臣之帶礪享良相之茅土不如永日嘯歌逍遙於黃葉青山下也甲戌八月甲寅東萊都昌黃元御撰
