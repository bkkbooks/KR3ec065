body:
  text: 卷二木部降香味苦微溫入足太陰脾手少陰心經療梃刃傷損治癰疽腫痛降香芳烈辛溫燒之闢疫癘之邪癰疽之病與夫跌打金瘡皮破血漏筋斷骨傷皆療丁香味辛氣溫入足太陰脾足陽明胃經溫燥脾胃驅逐脹滿治心腹疼痛除腰腿濕寒最止嘔噦善回滑溏殺蟲解蠱化塊磨堅起丈夫陽弱愈女子陰冷丁香辛烈溫燥驅寒瀉濕暖中扶土降逆升陷善治反胃腸滑寒結腹痛之證用母丁香雄者為雞舌香木香味辛微溫入足太陰脾足陽明胃經止嘔吐泄利平積聚癥瘕安胎保妊消脹止痛木香辛燥之性破滯攻堅是其所長庸工以治肝家之病則不通矣肝以風木之氣凡病皆燥最不宜者麵煨實大腸生磨消腫病白檀香味辛微溫入足陽明胃足太陰脾手太陰肺經治心腹疼痛消瘕疝凝結白檀香辛溫疏利破郁消滿亦治吐脹嘔泄之證磨塗面上黑痣紫檀香破瘀消腫止金瘡血漏煎飲磨塗最良烏藥味辛氣溫入足陽明胃足太陰脾手太陰肺經破瘀瀉滿止痛消脹烏藥辛散走瀉治痛滿吐利脹腫喘息寒疝衝突腳氣升逆之證但不宜虛家庸工以之治虛滿之病非良法也檳榔味苦辛性澀氣溫入足太陰脾足陽明胃經降濁下氣破郁消滿化水穀之陳宿行痰飲之停留治心腹痛楚療山水瘴癘檳榔辛溫下氣破滯磨堅行瘀敗陳宿之氣亦有用之良材若氣虛作滿則損正益邪不能奏效矣大腹子味辛苦性澀氣溫入足大陰脾足陽明胃經下氣寬胸行郁散濁大腹子即檳榔之別産而太腹者性既相同效亦不殊大腹皮專治皮膚腫脹亦甚不宜虛家腫脹有根本皮膚是腫脹之處所非腫脹之根本也庸工不知根本但於皮膚求之非徒無益而又害之阿魏味辛氣臭入足太陰脾足厥陰肝經闢瘟御瘴破積消症阿魏辛烈臭惡化血積血症固瘕㿗疝殺小蟲消瘧母闢瘟疫瘴癘之災解蘑菰牛馬之毒阿魏生西番崑崙地是木汁堅凝成冰松脂漬膠臭惡異常炒研入碗磁面崩損成片而下其克伐剝蝕之力無堅不破化癖磨症此為第一但可入膏藥敷貼不宜湯丸服餌也炒焦研細蘇木味辛咸氣平入足厥陰肝經調經行血破瘀止痛蘇木善行瘀血凡胎産癥瘕瘡瘍跌撲一切瘀血皆效血竭味鹹氣平入足厥陰肝經破瘀行血止痛續傷血竭破瘀血癥瘕積塊跌撲停瘀皆良亦止鼻衄便血並治惡瘡疥癬乳香味辛微溫入足厥陰肝經活血舒筋消腫止痛乳香活血行瘀治心腹疼痛消癰疽結腫散風癩瘙癢平跌打潰爛止口眼喎斜舒筋脈攣縮炒乾研用沒藥味苦氣平入足厥陰肝經破血止痛消腫生肌沒藥破血行瘀化老血宿症治癰疽痔漏金瘡杖瘡跌撲損傷一切血瘀腫痛療經期産後心腹疼痛諸證制同乳香棕櫚毛味苦性澀氣平入足厥陰肝經收斂失血固澀腸滑棕櫚毛收澀之性最能止血凡九竅流溢及金瘡跌打諸血皆止折斷燒灰存性用蕪荑味辛氣平入足厥陰肝經殺蟲破積止痢消瘡蕪荑殺臟腑諸蟲磨氣積血症治痔瘻疥癬一切諸瘡止寒冷痢蘆薈味苦性寒入足厥陰肝經殺蟲消痔退熱除疳蘆薈清熱殺蟲治痔瘻疥癬亦名象膽肉桂味甘辛氣香性溫入足厥陰肝經溫肝暖血破瘀消症逐腰腿濕寒驅腹脅疼痛肝屬木而藏血血秉木氣其性溫暖溫氣上升陽和舒布積而成熱則化心火木之溫者陽之半升火之熱者陽之全浮也人知氣之為陽而不知其實含陰精知血之為陰而不知其實抱陽氣血中之溫化火為熱之原也溫氣充足則陽旺而人康溫氣衰弱則陰盛而人病陽復則生陰勝則死生之與死美惡不同陽之與陰貴賤自殊蠢飛蠕動尚知死生之美惡下士庸工不解陰陽之貴賤千古禍源積成於貴陰賤陽之家矣欲求長生必扶陽氣扶陽之法當於氣血之中培其根本陽根微弱方胎水木之中止有不足萬無有餘世無溫氣太旺而生病者其肝家痛熱緣生意不足溫氣抑鬱而生風燥非陽旺而陰虛也肉桂溫暖條暢大補血中溫氣香甘入土辛甘入木辛香之氣善行滯結是以最解肝脾之郁金之味辛木之味酸辛酸者金木之郁肺肝之病也蓋金之性收木之性散金曰從革從則收而革不收於是作辛木曰曲直直則散而曲不散於是作酸辛則肺病酸則肝病以其鬱也故肺宜酸收而肝宜辛散肺得酸收則革者從降而辛味收肝得辛散則曲者直升而酸味散矣事有相反而相成者此類是也肝脾發舒溫氣升達而化陽神陽神司令陰邪無權卻病延年之道不外乎此凡經絡堙瘀臟腑癥結關節閉塞心腹疼痛等證無非溫氣微弱血分寒沍之故以至上下脫泄九竅不守紫黑成塊腐敗不鮮者皆其證也女子月期産後種種諸病總不出此悉宜肉桂余藥不能肉桂本系樹皮亦主走表但重厚內行所走者表中之裡究其力量所至直達臟腑與桂枝專走經絡者不同杜仲味辛氣平入足厥陰肝經榮筋壯骨健膝強腰杜仲去關節濕淫治腰膝痠痛腿足拘攣益肝腎養筋骨五加皮味辛微溫入足厥陰肝經逐濕開痹起痿伸攣五加皮通關瀉濕壯骨強筋治腰痛膝軟足痿筋拘男子陽痿囊濕女子陰癢陰蝕下部諸證蔓荊子味苦微溫入足厥陰肝經瀉風濕清頭目蔓荊子發散風濕治麻痹拘攣眼腫頭痛之證頭目疼痛乃膽胃逆升濁氣上壅所致庸醫以為頭風而用蔓荊子發散之藥不通極矣諸家本草皆出下士之手此等妄言不勝其數密蒙花味甘微寒入足厥陰肝經清肺潤燥明目去翳密蒙花清肝明目治紅腫翳障庸工習用不效也治病不求其本不解眼病根源浪用一切清涼發散之藥百治不得一效此庸工之所以庸也大風子味苦微熱入足厥陰肝經搽疥癘塗楊梅大風子辛熱發散治風癬疥癘楊梅之證取油塗抹研爛器收湯煮密封煎黑如膏名大楓子油槐實味苦性寒入足厥陰肝經涼血清風潤腸消痔槐實苦寒清肝家風熱治痔瘻腫痛陰瘡濕癢明目止淚清心除煩墜胎催生烏須黑髮口齒熱痛頭目暈眩寒瀉大腸潤燥開結楝子味苦性寒入足厥陰肝經瀉火除狂利水止痛苦楝子清肝瀉熱利水殺蟲治瘟疫傷寒煩躁狂亂止腹痛溺癃癩病痔瘻大便下血亦名金鈴子竹瀝味甘性寒入手太陰肺經清肺行痰竹瀝甘寒疏利清胸膈煩渴開痰涎膠黏治中風心肺鬱熱孔竅迷塞之證鮮竹去節火烘瀝下磁器接之其性雖寒不至滑瀉腸胃清上之藥最為佳品荊瀝味甘氣平入手太陰肺經化痰瀉熱止渴清風荊瀝化痰驅風治頭目暈眩中風不語之病功與竹瀝相同熱宜竹瀝寒宜荊瀝榆白皮味甘氣平入手太陰肺足太陽膀胱經止喘降逆利水消腫榆白皮清金利水治齁喘咳嗽淋漓消渴滑胎摧生行血消腫癰疽發背瘰癧禿瘡木芙蓉味辛氣平入手太陰肺足厥陰肝經清風瀉熱涼血消腫木芙蓉清利消散善敗腫毒一切瘡瘍大有捷效塗飲俱善金櫻子味成性澀入手陽明大腸足厥陰肝經斂腸止泄固精斷遺金櫻子酸斂澀固治泄利遺精肝氣鬱結者不宜酸斂之品服之則遺精愈甚當與升達之藥並用辛夷味辛微溫入手太陰肺足陽明胃經瀉肺降逆利氣破壅辛夷降瀉肺胃治頭痛口齒疼鼻塞收涕去鼾散寒止癢塗面潤膚吹鼻療瘡亦名木筆花蘇合香味辛性溫入手太陰肺足厥陰肝經闢鬼驅邪利水消腫蘇合香走散開通能殺蟲辟惡除邪治腫脹疹痱氣積血症調和臟腑卻一切不正之氣安息香味辛苦氣溫入手太陰肺足厥陰肝經除邪殺鬼固精壯陽安息香溫燥竄走治鬼支邪附陽痿精遺歷節疼痛及心腹疼痛之病熏服皆效燒之神降鬼逃韶腦味辛性熱入手太陰肺足厥陰肝經通經開滯去濕殺蟲韶腦辛烈之性通關透節去濕逐風寒治心疼腹痛腳氣牙蟲疥癬禿瘡箱籠席簟殺蠹闢蝨冰片味辛性涼入手太陰肺足厥陰肝經去翳明目開痹通喉冰片辛涼開散治赤目白翳喉痹牙疼鼻瘜舌出腸脫殺蟲消痔開竅散火蕤仁味甘微溫入手太陰肺足厥陰肝經明目止疼退赤收淚蕤仁理肺疏肝治眼病赤腫目爛淚流鼻癰衄血痞痰阻隔生胎多睡熟治不眠琥珀味辛甘氣平入手太陰肺足厥陰肝經明目去翳安魂定魄琥珀涼肺清肝磨障翳止驚悸除遺精白濁下死胎胞衣塗面益色敷疔拔毒止渴除煩滑胎摧生乳浸三日煮軟搗碎淡竹葉味甘微寒入足太陽膀胱經利水去濕瀉熱除煩淡竹葉甘寒滲利疏通小便清瀉膀胱濕熱沒石子味苦微溫入足少陰腎足厥陰肝經補精血烏鬚髮沒石子性氣溫澀治虛冷滑泄赤白痢疾合藥染須燒灰撲汗治陰汗亦名無餘子焙研屑用桑椹味甘氣平入足太陽膀胱足厥陰肝經止渴生津消腫利水桑湛滋木利水清風潤燥治消渴癃淋瘰癧禿瘡烏須黑髮桑葉治腳氣水腫撲損金瘡行瘀止渴長髮明目桑枝治腳氣中風喎斜拘攣咳嗽上氣紫白瘢風消癰疽利小便桑皮汁滅黑痣惡肉敷金瘡化積塊亦名木磠桑花澀腸止嗽治吐衄崩帶女貞子味苦氣平入足少陰腎足厥陰肝經強筋健骨祕精壯陽補益精血長養精神女貞子隆冬蒼翠非其溫暖之性不能如是楮實子味甘氣平入足少陰腎足太陽膀胱足厥陰肝經起痿助陽利水消腫楮實子溫暖肝腎補益虛勞壯筋骨強腰膝治陽事痿弱水氣脹滿明目去翳充膚悅顏療喉痹金瘡俱效枸札杞子味苦微甘性寒入足少陰腎足厥陰肝經補陰壯水滋木清風枸杞子苦寒之性滋潤腎肝寒瀉脾胃土燥便堅者宜之水寒土濕腸滑便利者服之必生溏泄本草謂其助陽甚不然也根名地骨皮清肝瀉熱涼骨除蒸止吐血齒衄金瘡血漏止熱消渴桑寄生味苦氣平入足少陰腎足厥陰肝經壯骨榮筋止血通乳桑寄生通達經絡驅逐濕痹治腰痛背強筋痿骨弱血崩乳閉胎動腹痛痢疾金瘡癰疽堅發齒長眉須雷丸味苦性寒入手少陰心足厥陰肝經殺蟲解蠱止汗除癲雷丸清熱疏肝殺寸白小蟲驅風除癇止小兒汗久服令人陰痿甘草水浸去皮切炮為末撲身止汗天竺黃味甘性寒入手少陰心足少陽膽經瀉熱寧神止驚除痰天竺黃清君相火邪治驚悸癲癇中風痰迷失音不語明目安心清熱解毒柏子仁味甘辛氣平入足太陰脾手陽明大腸手少陰心足厥陰肝經潤燥除濕斂氣寧神柏子仁辛香甘澀秉燥金斂肅之氣而體質則極滋潤能收攝神魂寧安驚悸滑腸開祕榮肝起痿明目聰耳健膝強腰澤潤舒筋斂血止汗燥可瀉濕潤亦清風至善之品蒸曬舂簸取仁炒研燒瀝取油光澤鬚髮塗抹癬疥搽黃水瘡濕最效松子仁味甘辛氣平入手太陰肺手陽明大腸手少陰心足厥陰肝經潤燥清風除濕開痹松子仁與柏子仁相同收澀不及而滋潤過之潤肺止咳滑腸通祕開關逐痹澤膚榮毛亦佳善之品研揩鬚髮最生光澤松子大如豆粒光頭三角出雲南遼東中原無此松香治癰疽疥痱禿瘡血瘻止痛生肌排膿收口止崩除帶強筋固齒歷節疼痛陰囊濕癢松節治腰腿濕痹筋骨疼痛松花止血
