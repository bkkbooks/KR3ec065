body:
  text: 卷一草部蒼朮味甘微辛入足太陰脾足陽明胃經燥土利水瀉飲消痰開鬱去滿化癖除症理吞吐酸腐闢山川瘴癘起筋骨之痿軟回溲溺之混濁白朮守而不走蒼朮走而不守故白朮善補蒼朮善行其消食納穀止嘔住泄亦同白朮而瀉水開鬱則蒼朮獨長蓋木為青龍因己土而變色金為白虎緣戊土而化形白朮入胃其性靜專故長於守蒼朮入脾其性動蕩故長於行入胃則兼達辛金而降濁入脾則並走乙木而達郁白朮之止渴生津者土燥而金清也蒼朮之除酸而去腐者土燥而木榮也白朮偏入戊土則納粟之功多蒼朮偏入己土則消穀之力旺己土健則清升而濁降戊土健則濁降而清亦升然自此而達彼者兼及之力也後彼而先此者專效之能也若是脾胃雙醫則宜蒼朮白朮並用茅山者佳制同白朮新制雙術法列下選於茅二術堅實肥鮮者各一斤別器泔浸換水令潤透去皮切片曬用黃耆沙參生薑半夏各八兩煎濃汁浸白朮大棗龍眼砂仁各八兩煎濃汁浸蒼朮各用磁盤隔布鋪蓋濕米砂鍋蒸透曬乾再浸再蒸汁盡而止量加暖水溫中之品合煎久餌實能延年卻老戊己轉運水火交濟環鉛聚汞之理醫家不解妄以滋陰之藥促命夭年甚可恨也黃土炒白朮芝麻炒蒼朮無知妄作不通之極黃精味甘入足太陰脾足陽明胃經補脾胃之精潤心肺之燥黃精滋潤醇濃善補脾精不生胃氣未能益燥但可助濕上動胃逆濁氣充塞故多服頭痛濕旺者不宜本草輕身延年之論未可盡信也砂鍋蒸曬用鉤吻即野葛形似黃精殺人益智仁味辛氣溫入足太陰脾足陽明胃經和中調氣燥濕溫寒遺精與淋濁俱療吐血與崩漏兼醫凡男子遺精淋濁女子帶下崩漏皆水寒土濕肝脾郁陷之故總之木鬱亦生下熱而熱究不在脾胃庸工謂其相火之旺胡説極矣其脾胃上逆則病吐血往往紫黑成碗終損性命益智仁溫燥濕寒運行鬱結戊己旋轉金木升降故治諸證然非瀉水補火培土養中之藥未能獨奏奇功去殼炒研消食亦良草豆蔻味辛氣溫入足太陰脾足陽明胃經燥濕調中運行郁濁善磨飲食能驅痰飲治胃口寒濕作痛療腹中腐敗成積泄穢吞酸俱效蠻煙瘴癧皆醫痎瘧堪療霍亂可愈反胃噎膈之佳藥嘔吐泄利之良品化魚肉停留斷赤白帶下草豆蔻調和脾胃溫燥寒濕運行郁濁推宕陳宿亦與砂仁相仿而性氣頗烈內郁稍重者宜之麵包裹煨研去皮縮砂仁味辛氣香入足太陰脾足陽明胃經和中調氣行郁消滿降胃陰而下食達脾陽而化谷嘔吐與泄利皆良咳嗽共痰飲俱妙善療噎膈能安胎妊調上焦之腐酸理下氣之穢濁除咽喉口齒之熱化銅鐵骨刺之鯁清升濁降全賴中氣中氣非旺則樞軸不轉脾陷胃逆凡水脹腫滿痰飲咳嗽噎膈泄利霍亂轉筋胎墜肛脫谷宿水停泄穢吞酸諸證皆升降反常清陷濁逆故也瀉之則益損其虛補之則愈增其滿清之則滋其下寒溫之則生其上熱緣其中氣堙郁清濁易位水木下陷不受宣瀉火金上逆不受溫補也惟以養中之味而加和中之品調其滯氣使之回旋樞軸運動則升降復職清濁得位然後於補中扶土之內溫升其肝脾清降其肺胃無有憂矣和中之品莫妙如砂仁沖和條達不傷正氣調理脾胃之上品也去殼炒研湯沖服則氣足補骨脂味辛苦氣溫入足太陰脾足少陰腎手陽明大腸經溫脾暖腎消水化食治膝冷腰疼療腸滑腎泄能安胎墜善止遺精收小兒遺溺興丈夫痿陽除陰囊之濕愈關節之涼陽衰土濕之家中氣堙郁升降失位火金上逆水木下陷夜而陰旺濕增心腎愈格子半陽生之際木氣萌生不得上達溫氣下郁遂興陽而夢泄此宜燥土瀉濕升脾降胃交金木而濟水火道家媒合嬰兒奼女首重黃婆玄理幽妙醫工不解也補骨脂溫暖水土消化飲食升達肝脾收斂滑泄遺精帶下溺多便滑諸證甚有功效方書稱其延年益壽雖未必信然要亦佳善之品也鹽酒拌潤炒研曬乾用同青鹽乳香搽日久牙痿肉豆蔻味辛性溫氣香入足太陰脾足陽明胃經溫中燥土消穀進食善止嘔吐最收泄利治寒濕腹痛療赤白痢疾化痰水停留磨飲食陳宿肉豆蔻調和脾胃升降清濁消納水穀分理便溺至為妙品而氣香燥善行宿滯其性斂澀專固大腸消食止泄此為第一麵包煨研去油湯沖肉蔻辛香頗動噁心服之欲嘔宜蜜小丸烘乾湯送胡蘆巴味苦辛氣溫入足陽明胃足少陰腎經瀉濕驅寒破瘕消疝胡蘆巴苦溫下行治水土濕腹脅滿脹寒疝冷瘕囊墜腳腫之證白豆蔻味辛氣香入足陽明胃手太陰肺經降肺胃之沖逆善止嘔吐開胸膈之鬱滿能下飲食噎膈可效痎瘧亦良去睛上翳障消腹中脹疼白豆蔻清降肺胃最驅膈上郁濁極療噁心嘔噦嚼之辛涼清肅肺腑郁煩應時開爽秉秋金之氣古方謂其大熱甚不然也研細湯沖紅豆蔻味辛氣溫入足太陰脾足陽明胃經治脾胃濕寒痛脹皆消療水穀停瘀吐泄俱斷善止霍亂瘧痢能除反胃噎膈去胸腹之酸穢散山川之瘴癧紅豆蔻調理脾胃溫燥濕寒開通瘀塞宣導汙濁亦與草豆蔻無異而力量稍健內瘀極重者宜之上熱易作鼻衄牙痛之家盡屬中下濕寒膽火不降當溫燥中下候上熱不作而用之去殼研用紅豆蔻即良薑子與良薑性同大茴香味辛微溫入足陽明胃足少陰腎經降氣止嘔溫胃下食暖腰膝消㿉疝茴香性溫下達治水土濕寒腰痛腳氣固瘕寒疝之證香附味苦氣平入足太陰脾足厥陰肝經開鬱止痛治肝家諸證但肝以風木之氣升達不遂則生風燥香附降伏之性最不相宜香燥之氣亦正相反庸工香附諸方造作謬妄不通蓽茇味辛氣溫入足太陰脾足陽明胃經溫脾胃而化谷暖腰膝而止痛吐泄皆醫疝瘕並效蓽茇辛燥溫暖治水穀不消腸鳴水泄心腹疼脹嘔逆酸心之病甚佳醋浸焙用蓽茇與蓽澄茄性味相同功效無殊皆胡椒類也藿香味辛微溫入足太陰脾足陽明胃經降逆止嘔開胃下食藿香辛溫下氣善治霍亂嘔吐心腹脹滿之病煎漱口臭香薷味辛微溫入足陽明胃足太陽膀胱經利水瀉濕止嘔斷利溫胃調中治霍亂腹痛吐利之證利小便消水腫止鼻衄療腳氣庸工用之治暑病蓽澄茄味辛氣溫入足太陰脾足陽明胃經溫燥脾胃消納水穀能止脹痛善除嘔吐澄茄溫燥之性甚宜脾胃寒濕下氣降濁進食消穀治霍亂吐泄反胃噎膈之病酒浸炒用形似胡椒使君子味甘微溫入足太陰脾足厥陰肝經利水燥土殺蟲止泄使君子燥濕溫中疏木殺蟲治小便白濁大便泄利痞塊癬瘡每月上旬取仁數枚空腹食之蟲皆死戒飲熱茶犯之則泄威靈仙味苦微溫入足太陰脾足厥陰肝經起癱開痹化癖行痰威靈仙瀉濕驅風行痰逐飲治手頑足痹腰痛膝軟老血夙症積水停痰虛家勿用白附子味辛甘性溫入足太陰脾足厥陰肝經驅風瀉濕逐痹行痰溫燥發瀉表散風濕治中風失音鼻口偏斜耳聾喉痹疥癬疝瘕面上皯𪒟陰下濕癢行痰涎止唾慈菰味甘微寒入足太陰脾足厥陰肝經下食消穀止血磨症摧産下衣行血通經慈菰甘寒通利破産後瘀血開小便澀淋滑胎下衣妊婦忌食牽牛子味甘氣寒入足陽明胃手陽明大腸手太陽小腸足太陽膀胱經逐痰瀉水破聚決壅牽牛子下停痰積水宿谷堅瘕殺蟲瀉蠱除腫消脹溺癃便結風刺雀斑之證皆醫功力甚猛虛者勿服去皮研末用何首烏味甘性澀氣平入足厥陰肝經養血榮筋息風潤燥斂肝氣之疏泄遺精最效舒筋脈之拘攣偏枯甚良瘰癧癰腫皆消崩漏淋漓俱止消痔至妙截瘧如神何首烏滋益肝血榮舒筋脈治中風左半偏枯之病甚佳輔以燥土暖水之味佐以疏木導經之品絶有奇功而不至助濕敗脾遠勝地黃龜膠之類方書謂其黑髮烏須悅顏卻老理頗不虛蓋陰者陽之宅也肝血溫升生化魂神血敗則溫氣亡泄魂神脫矣未有宮室毀壞而主人無恙者也何首烏滋肝養血則魂神暢茂長生延年理有必至但宜加以扶陽之藥不可參以助陰之品庸工開補陰之門龜地之殺人多矣米泔換浸一兩天銅刀切片黑豆拌勻砂鍋蒸曬數次肉蓯蓉味甘咸氣平入足厥陰肝足少陰腎手陽明大腸經暖腰膝健筋骨滋腎肝精血潤腸胃結燥凡糞粒堅小形如羊屎此土濕木鬱下竅閉塞之故谷滓在胃不得順下零星傳送斷落不聯歷陽明大腸之燥煉成顆粒祕澀難通總緣風木枯稿疏泄不行也一服地黃龜膠反益土濕中氣愈敗矣肉蓯蓉滋木清風養血潤燥善滑大腸而下結糞其性從容不迫未至滋濕敗脾非諸潤藥可比方書稱其補精益髓悅色延年理男子絶陽不興女子絶陰不産非溢美之詞鎖陽味甘微溫入足厥陰肝經補血滋陰滑腸潤燥鎖陽滋肝養血潤大腸枯燥榮筋起痿最助陽事性與肉蓯蓉同丹參葉甘氣平入足厥陰肝經行經破瘀通經止痛丹參調經安胎磨堅破滯一切癰疽痂癩癭瘤疥癬皆良癥瘕崩漏兼醫本草謂其破宿血生新血落死胎疏通血脈治腳膝痿痹走及奔馬行血之良品也澤蘭味苦微溫入足厥陰肝經通經活血破滯磨堅胎産俱良瘕症頗善止腰腹疼痛消癰疽熱腫跌打吐衄能瘳澤蘭辛溫香散行血破瘀通脈安胎一切癰疽癥瘕金瘡撲打吐衄諸證皆醫而氣味和平不傷迅利行經化結之良品也益母草味苦辛氣平入足厥陰肝經活血行經破瘀通脈胎産崩漏癰疽癥瘕跌打損傷悉效益母草調經行血治一切血證破瘀掃腐下死胎摧胞衣並醫各色瘡瘍女子良藥劉寄奴味苦微溫入足厥陰肝經活血行瘀化症破結善行瘀血凡經期産後湯火跌撲血瘀諸證俱瘳止便溺失血金瘡不收口並捷延胡索味苦辛微溫入足厥陰肝經調經破血化塊消症專行滯血治經瘀腹疼化積聚癥瘕理跌撲損傷胭脂味甘氣平入足厥陰肝經活血行瘀消腫止疼此紅蘭花所作活血與花同䕡茹味辛微寒入足厥陰肝經行老血破宿症掃除凝血消磨瘀肉䕡茹有去腐決壅之力素問同烏鰂骨治婦人血枯王氏以為去惡也薑黃味甘苦性寒入足厥陰肝經破血化症消腫敗毒破瘀血宿症消撲損癰疽止心腹疼痛平疥癬初生地榆味苦氣寒入足厥陰肝經瀉熱清肝涼營止血地榆苦寒沉降止吐衄便溺崩漏金瘡諸血但大凡失血證內寒者多而熱者少庸工以治下焦血病最不通三七味甘微苦入足厥陰肝經和營止血通脈行瘀三七行瘀血而斂新血凡産後經期跌打癰腫一切瘀血皆破凡吐衄崩漏刀傷箭射一切新血皆止血病之上藥也蒲黃味甘氣平入足厥陰肝經行瘀止血蒲黃亦行瘀血而斂新血經産癰疽癥瘕跌撲能破吐衄崩漏痔瘡痢疾鮮血能止調經止帶安胎下乳心腹諸證下衣摧生皆善續斷味苦微溫入足厥陰肝經行血破瘀斂營補損續斷行瘀血而斂新血崩漏癥瘕癰疽瘰癧淋漓痔瘻跌打金瘡諸血能止能行有回虛補損接骨續筋之力大薊味苦微溫入足厥陰肝經回失紅行瘀血大薊亦行瘀血而斂新血吐衄崩漏癰疽跌打及腸癰血積金瘡蠱毒蟲毒俱治小薊性同而力猶薄不能瘳癰消腫但破血耳茜草味苦微寒入足厥陰肝經通經脈瘀塞止營血流溢茜草亦行瘀血斂新血吐衄崩漏跌打損傷痔瘻瘡癤俱治即染紅茜草根紫草味苦氣寒入足厥陰肝經清肝涼血瀉火伐陽紫草疏利涼血活瘀寒胃滑腸痘色紅紫之證緣營閉衛虛不能外達庸工以為血瘀用紫草治之百治百死今古不悟可惡三稜味苦氣平入足厥陰肝經破滯行瘀消積化塊三陵磨積聚癥瘕善破老血通經利氣下乳墮胎止經産心腹諸痛消跌撲損傷諸瘀軟瘡瘍癰腫堅硬莪朮味苦辛微溫入足厥陰肝經破滯攻堅化結行瘀蒁俗作術消癖塊破血症化腑臟痼冷散跌撲停瘀通經開閉止痛散結醋炒用鉤藤鉤